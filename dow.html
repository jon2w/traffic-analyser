<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hourly Profile by Day of Week — Traffic Monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:opsz,wght@9..144,300;9..144,600;9..144,700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg:      #f5f2ee;
    --surface: #fffefb;
    --border:  #e8e2d9;
    --text:    #1a1714;
    --muted:   #8a8076;
    --accent1: #e8541a;
    --accent2: #2d6a9f;
    --accent3: #2a9d5c;
    --accent4: #f0a500;
    --accent5: #9b3fbf;
    --shadow:  0 2px 12px rgba(0,0,0,0.07);
    --radius:  14px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
  }

  .header-title {
    font-family: 'Fraunces', serif;
    font-size: 1.15rem;
    font-weight: 600;
    white-space: nowrap;
  }

  .header-title a {
    color: var(--muted);
    text-decoration: none;
    font-size: 0.8rem;
    font-family: 'DM Sans', sans-serif;
    font-weight: 400;
    margin-right: 0.6rem;
  }
  .header-title a:hover { color: var(--text); }

  /* ── Controls ── */
  .controls {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    flex-wrap: wrap;
  }

  .controls label {
    font-size: 0.78rem;
    color: var(--muted);
    white-space: nowrap;
  }

  .controls input[type="date"] {
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.3rem 0.6rem;
    background: var(--bg);
    color: var(--text);
    cursor: pointer;
  }

  .shortcut-btns {
    display: flex;
    gap: 0.3rem;
  }

  .shortcut-btns button {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.72rem;
    padding: 0.28rem 0.6rem;
    border: 1px solid var(--border);
    border-radius: 7px;
    background: var(--bg);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .shortcut-btns button:hover,
  .shortcut-btns button.active {
    background: var(--text);
    color: #fff;
    border-color: var(--text);
  }

  /* ── Main ── */
  main {
    max-width: 1300px;
    margin: 2rem auto;
    padding: 0 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }

  /* ── Chart card ── */
  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 1.4rem 1.6rem 1.6rem;
  }

  .chart-title {
    font-family: 'Fraunces', serif;
    font-size: 1.05rem;
    font-weight: 600;
    margin-bottom: 0.2rem;
  }

  .chart-subtitle {
    font-size: 0.78rem;
    color: var(--muted);
    margin-bottom: 1rem;
  }

  .chart-wrap {
    position: relative;
  }

  /* ── Day toggles ── */
  .day-toggles {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-bottom: 1rem;
  }

  .day-toggle {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.8rem;
    padding: 0.3rem 0.75rem;
    border-radius: 20px;
    border: 2px solid;
    cursor: pointer;
    transition: opacity 0.15s, background 0.15s;
    user-select: none;
    font-family: 'DM Sans', sans-serif;
    background: transparent;
  }

  .day-toggle.hidden {
    opacity: 0.35;
  }

  .day-toggle .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ── Stats row ── */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 1rem;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 1.1rem 1.3rem;
    border-top: 4px solid;
  }

  .stat-label {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    margin-bottom: 0.35rem;
  }

  .stat-value {
    font-family: 'Fraunces', serif;
    font-size: 1.6rem;
    font-weight: 700;
    line-height: 1;
  }

  .stat-sub {
    font-size: 0.72rem;
    color: var(--muted);
    margin-top: 0.25rem;
  }

  /* ── Peak table ── */
  .peak-table-wrap {
    overflow-x: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.82rem;
  }

  thead th {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    text-align: left;
    padding: 0.4rem 0.75rem;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }

  tbody tr:hover { background: var(--bg); }

  tbody td {
    padding: 0.55rem 0.75rem;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }

  .day-chip {
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
    font-weight: 500;
  }

  .day-chip .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .peak-bar {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .peak-bar-inner {
    height: 6px;
    border-radius: 3px;
    transition: width 0.4s ease;
  }

  /* ── Loading / error ── */
  .loading {
    text-align: center;
    padding: 3rem;
    color: var(--muted);
    font-size: 0.9rem;
  }

  /* ── Responsive ── */
  @media (max-width: 640px) {
    header { flex-direction: column; height: auto; padding: 0.8rem 1rem; gap: 0.6rem; }
    .controls { justify-content: center; }
  }
</style>
</head>
<body>

<header>
  <div class="header-title">
    <a href="/">← Dashboard</a>
    Hourly Profile by Day of Week
  </div>
  <div class="controls">
    <div class="shortcut-btns">
      <button onclick="setShortcut(7)"  id="btn-7">7d</button>
      <button onclick="setShortcut(14)" id="btn-14">2w</button>
      <button onclick="setShortcut(30)" id="btn-30" class="active">Month</button>
      <button onclick="setShortcut(90)" id="btn-90">3m</button>
      <button onclick="setShortcut(365)" id="btn-365">Year</button>
    </div>
    <label>From</label>
    <input type="date" id="date-from" onchange="onDateChange()">
    <label>To</label>
    <input type="date" id="date-to"   onchange="onDateChange()">
  </div>
</header>

<main>
  <div id="stats-row" class="stats-grid"></div>

  <div class="chart-card">
    <div class="chart-title">Hourly Profile by Day of Week</div>
    <div class="chart-subtitle">Average vehicles per hour — each line is a day of the week</div>
    <div class="day-toggles" id="day-toggles"></div>
    <div class="chart-wrap"><canvas id="chart-dow" height="260"></canvas></div>
  </div>

  <div class="chart-card">
    <div class="chart-title">Peak Hour Summary</div>
    <div class="chart-subtitle">Busiest hour and volume for each day</div>
    <div class="peak-table-wrap">
      <table>
        <thead>
          <tr>
            <th>Day</th>
            <th>Morning peak</th>
            <th>Evening peak</th>
            <th>Quietest hour</th>
            <th>Daily avg (6–22h)</th>
            <th>Peak vs avg</th>
          </tr>
        </thead>
        <tbody id="peak-table"></tbody>
      </table>
    </div>
  </div>
</main>

<script>
// ── Config ──────────────────────────────────────────────────────────────────
const DOW_COLORS = ['#e8541a','#2d6a9f','#2a9d5c','#f0a500','#9b3fbf','#e05c9e','#3db8d4'];
const BASE_URL   = window.location.origin;
const baseFont   = { family: "'DM Sans', sans-serif", size: 11 };

let chart      = null;
let dowData    = [];
let visibility = {}; // day_name → bool

// ── Dates ────────────────────────────────────────────────────────────────────
function today() {
  return new Date().toISOString().slice(0, 10);
}

function daysAgo(n) {
  const d = new Date();
  d.setDate(d.getDate() - n);
  return d.toISOString().slice(0, 10);
}

function setShortcut(days) {
  document.getElementById('date-from').value = daysAgo(days);
  document.getElementById('date-to').value   = today();
  document.querySelectorAll('.shortcut-btns button').forEach(b => b.classList.remove('active'));
  const ids = {7:'btn-7',14:'btn-14',30:'btn-30',90:'btn-90',365:'btn-365'};
  if (ids[days]) document.getElementById(ids[days]).classList.add('active');
  load();
}

function onDateChange() {
  document.querySelectorAll('.shortcut-btns button').forEach(b => b.classList.remove('active'));
  load();
}

// ── API ──────────────────────────────────────────────────────────────────────
async function api(endpoint) {
  const from = document.getElementById('date-from').value;
  const to   = document.getElementById('date-to').value;
  const r    = await fetch(`${BASE_URL}${endpoint}?from=${from}&to=${to}`);
  if (!r.ok) throw new Error(`API error ${r.status}`);
  return r.json();
}

// ── Chart helpers ────────────────────────────────────────────────────────────
function baseScales(xLabel='', yLabel='') {
  return {
    x: {
      ticks: { font: baseFont, color: '#8a8076', maxRotation: 0 },
      title: xLabel ? { display: true, text: xLabel, font: baseFont } : {},
      grid: { color: '#e8e2d9' }
    },
    y: {
      ticks: { font: baseFont, color: '#8a8076' },
      title: yLabel ? { display: true, text: yLabel, font: baseFont } : {},
      grid: { color: '#e8e2d9' },
      beginAtZero: true
    }
  };
}

// ── Toggle logic ─────────────────────────────────────────────────────────────
function buildToggles() {
  const container = document.getElementById('day-toggles');
  container.innerHTML = '';
  dowData.forEach((d, i) => {
    const color = DOW_COLORS[i % DOW_COLORS.length];
    const btn   = document.createElement('button');
    btn.className = 'day-toggle' + (visibility[d.day_name] === false ? ' hidden' : '');
    btn.style.borderColor = color;
    btn.style.color       = color;
    btn.innerHTML = `<span class="dot" style="background:${color}"></span>${d.day_name}`;
    btn.onclick = () => toggleDay(d.day_name, i, btn);
    container.appendChild(btn);
  });
}

function toggleDay(name, idx, btn) {
  visibility[name] = visibility[name] === false ? true : false;
  btn.classList.toggle('hidden', visibility[name] === false);
  if (chart) {
    chart.data.datasets[idx].hidden = (visibility[name] === false);
    chart.update();
  }
}

// ── Stats row ────────────────────────────────────────────────────────────────
function renderStats() {
  if (!dowData.length) return;

  // Find busiest single hour across all days
  let topVehicles = 0, topDay = '', topHour = 0;
  let quietestDay = '', quietestHour = 0, quietestVehicles = Infinity;

  dowData.forEach(d => {
    d.hours.forEach((v, h) => {
      if (v > topVehicles) { topVehicles = v; topDay = d.day_name; topHour = h; }
      if (h >= 1 && h <= 5 && v < quietestVehicles) {
        quietestVehicles = v; quietestDay = d.day_name; quietestHour = h;
      }
    });
  });

  // Busiest day overall (sum 6–22h)
  let busiestDay = '', busiestTotal = 0;
  dowData.forEach(d => {
    const total = d.hours.slice(6, 23).reduce((a, b) => a + b, 0);
    if (total > busiestTotal) { busiestTotal = total; busiestDay = d.day_name; }
  });

  const quietestDayName = (() => {
    let min = Infinity, name = '';
    dowData.forEach(d => {
      const t = d.hours.slice(6, 23).reduce((a, b) => a + b, 0);
      if (t < min) { min = t; name = d.day_name; }
    });
    return name;
  })();

  const statsEl = document.getElementById('stats-row');
  const colors  = ['var(--accent1)','var(--accent2)','var(--accent3)','var(--accent4)'];
  const stats = [
    { label: 'Peak hour',        value: `${String(topHour).padStart(2,'0')}:00`,     sub: `${topDay} · ${topVehicles} vehicles`,       color: colors[0] },
    { label: 'Busiest day',      value: busiestDay,                                   sub: `highest daytime volume`,                    color: colors[1] },
    { label: 'Quietest day',     value: quietestDayName,                              sub: `lowest daytime volume`,                     color: colors[2] },
    { label: 'Peak volume',      value: topVehicles.toLocaleString(),                 sub: `vehicles in one hour`,                      color: colors[3] },
  ];

  statsEl.innerHTML = stats.map(s => `
    <div class="stat-card" style="border-top-color:${s.color}">
      <div class="stat-label">${s.label}</div>
      <div class="stat-value">${s.value}</div>
      <div class="stat-sub">${s.sub}</div>
    </div>
  `).join('');
}

// ── Peak table ───────────────────────────────────────────────────────────────
function renderPeakTable() {
  const tbody  = document.getElementById('peak-table');
  const maxAvg = Math.max(...dowData.map(d => {
    const slice = d.hours.slice(6, 23);
    return slice.reduce((a,b) => a+b, 0) / slice.length;
  }));

  tbody.innerHTML = dowData.map((d, i) => {
    const color = DOW_COLORS[i % DOW_COLORS.length];

    // Morning peak: 6–12
    const morningSlice = d.hours.slice(6, 13);
    const morningPeak  = Math.max(...morningSlice);
    const morningHour  = morningSlice.indexOf(morningPeak) + 6;

    // Evening peak: 14–20
    const eveningSlice = d.hours.slice(14, 21);
    const eveningPeak  = Math.max(...eveningSlice);
    const eveningHour  = eveningSlice.indexOf(eveningPeak) + 14;

    // Quietest (full 24h)
    const quietest  = Math.min(...d.hours);
    const quietHour = d.hours.indexOf(quietest);

    // Avg 6–22
    const daySlice = d.hours.slice(6, 23);
    const avg = Math.round(daySlice.reduce((a,b) => a+b, 0) / daySlice.length);

    // Peak vs avg ratio (use higher of morning/evening)
    const peakVeh  = Math.max(morningPeak, eveningPeak);
    const ratio    = avg > 0 ? (peakVeh / avg).toFixed(1) : '—';
    const barPct   = Math.round((avg / maxAvg) * 100);

    const fmt = h => `${String(h).padStart(2,'0')}:00`;

    return `<tr>
      <td><span class="day-chip"><span class="dot" style="background:${color}"></span>${d.day_name}</span></td>
      <td>${fmt(morningHour)} <span style="color:var(--muted);font-size:0.75rem">(${morningPeak})</span></td>
      <td>${fmt(eveningHour)} <span style="color:var(--muted);font-size:0.75rem">(${eveningPeak})</span></td>
      <td>${fmt(quietHour)}  <span style="color:var(--muted);font-size:0.75rem">(${quietest})</span></td>
      <td>
        <div class="peak-bar">
          <div class="peak-bar-inner" style="width:${barPct}%;background:${color};min-width:4px;max-width:120px"></div>
          <span>${avg}</span>
        </div>
      </td>
      <td style="color:var(--muted)">×${ratio}</td>
    </tr>`;
  }).join('');
}

// ── Main chart ───────────────────────────────────────────────────────────────
function renderChart() {
  const hourLabels = Array.from({length:24}, (_, h) => `${String(h).padStart(2,'0')}:00`);
  const datasets   = dowData.map((d, i) => ({
    label:           d.day_name,
    data:            d.hours,
    borderColor:     DOW_COLORS[i % DOW_COLORS.length],
    backgroundColor: 'transparent',
    pointRadius:     0,
    pointHoverRadius: 5,
    borderWidth:     2.5,
    tension:         0.4,
    hidden:          visibility[d.day_name] === false
  }));

  if (chart) chart.destroy();

  chart = new Chart(document.getElementById('chart-dow'), {
    type: 'line',
    data: { labels: hourLabels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          display: false // we use custom toggles
        },
        tooltip: {
          mode: 'index',
          intersect: false,
          backgroundColor: '#fffefb',
          titleColor: '#1a1714',
          bodyColor: '#1a1714',
          borderColor: '#e8e2d9',
          borderWidth: 1,
          titleFont: { ...baseFont, weight: '600' },
          bodyFont: baseFont,
          padding: 10,
          callbacks: {
            title: items => `${items[0].label}`,
            label: item => ` ${item.dataset.label}: ${item.raw} vehicles`
          }
        }
      },
      scales: baseScales('Hour', 'Vehicles'),
      interaction: { mode: 'index', intersect: false }
    }
  });
}

// ── Load ─────────────────────────────────────────────────────────────────────
async function load() {
  try {
    dowData = await api('/api/hourly_by_dow');

    // Init visibility state for any new days
    dowData.forEach(d => {
      if (!(d.day_name in visibility)) visibility[d.day_name] = true;
    });

    renderStats();
    buildToggles();
    renderChart();
    renderPeakTable();
  } catch(e) {
    console.error(e);
    document.querySelector('main').innerHTML =
      `<div class="loading">⚠️ Could not load data: ${e.message}</div>`;
  }
}

// ── Init ─────────────────────────────────────────────────────────────────────
document.getElementById('date-from').value = daysAgo(30);
document.getElementById('date-to').value   = today();
load();
</script>
</body>
</html>
